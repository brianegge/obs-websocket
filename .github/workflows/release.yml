name: Release

on:
  push:
    branches:
      - main
    paths:
      - "custom_components/**"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          version=$(jq -r .version custom_components/obs_websocket/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Bump patch version
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          new_version="${major}.${minor}.$((patch + 1))"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Update manifest for release zip
        run: |
          jq --arg v "${{ steps.bump.outputs.version }}" '.version = $v' \
            custom_components/obs_websocket/manifest.json > tmp.json
          mv tmp.json custom_components/obs_websocket/manifest.json

      - name: Create release zip
        run: |
          cd custom_components/obs_websocket
          zip -r ../../obs-studio.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }}"
          files: obs-studio.zip
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
